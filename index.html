<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

<body>

<header>
    <h1>风景摄影作品集</h1>
    <nav>
        <a href="/-/index.html">首页</a>
        <a href="/-/about.html">关于我</a>
        <a href="/-/contact.html">联系我</a>
    </nav>
</header>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>摄影作品集</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="logo">摄影集</div>
        <div class="filter-bar">
            <button data-filter="all" class="active">全部</button>
            <button data-filter="mountain">山</button>
            <button data-filter="ocean">海</button>
            <button data-filter="forest">森林</button>
            <button data-filter="other">其他</button>
        </div>
    </nav>

    <!-- 上传区 -->
    <div class="upload-section">
        <input type="file" id="uploadInput" multiple accept="image/*" style="display:none" />
        <button id="uploadBtn">上传图片</button>
        <div id="dropZone" class="drop-zone">
            拖放图片到这里
        </div>
        <div id="progressContainer" class="progress-container" style="display:none;">
            <div id="progressBar" class="progress-bar"></div>
        </div>
    </div>

    <!-- 瀑布流容器 -->
    <div id="gallery" class="gallery"></div>

    <!-- 灯箱 -->
    <div id="lightbox" class="lightbox">
        <span class="close">&times;</span>
        <img id="lightbox-img" src="" alt="大图" />
        <div id="lightbox-title" class="lightbox-title"></div>
    </div>

    <!-- Supabase JS SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js"></script>
</body>
</html>
