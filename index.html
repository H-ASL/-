<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>风景摄影作品集</title>
    <!-- 引入你之前改好的样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>风景摄影作品集</h1>
        <nav>
            <a href="index.html">首页</a>
            <a href="about.html">关于我</a>
            <a href="contact.html">联系我</a>
        </nav>
    </header>

    <main>
        <section class="intro">
            <h2>捕捉自然的光影与瞬间</h2>
            这里是我的风景摄影作品展示。
        </section>

        <section class="gallery">
            <div class="photo-grid">
                
                <!-- 图片1：雪山 -->
                <figure>
                    <img src="/images/image1.jpg" alt="雪山日出">
                    <figcaption>山间晨雾</figcaption>
                </figure>

                <!-- 图片2：帆船 -->
                <figure>
                    <img src="/images/image2.jpg" alt="海上日落">
                    <figcaption>扬帆逐日</figcaption>
                </figure>

                <!-- 图片3：森林 -->
                <figure>
                    <img src="/images/image3.jpg" alt="森林光影">
                    <figcaption>林间漫步</figcaption>
                </figure>

                <!-- 图片4：红叶 -->
                <figure>
                    <img src="/images/image4.jpg" alt="秋日红叶">
                    <figcaption>霜叶红于二月花</figcaption>
                </figure>

            </div>
        </section>
    </main>

</body>
</html>
