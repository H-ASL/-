<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>风景摄影社区</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>光影纪 · 风景摄影</h1>
    <nav>
        <a href="index.html" class="active">首页</a>
        <a href="about.html">关于我</a>
        <a href="contact.html">联系</a>
    </nav>
</header>

<main class="container">
    <!-- 上传区域 (使用文档中的 .upload-area) -->
    <div class="upload-area">
        <input type="file" id="uploadInput" multiple accept="image/*" hidden>
        <button id="uploadBtn">+ 上传作品</button>
        
        <select id="categorySelect">
            <option value="mountain">山川</option>
            <option value="ocean">海洋</option>
            <option value="forest">森林</option>
        </select>
    </div>

    <!-- 分类筛选 (使用文档中的 .filter-bar) -->
    <div class="filter-bar">
        <button data-filter="all" class="active">全部</button>
        <button data-filter="mountain">山川</button>
        <button data-filter="ocean">海洋</button>
        <button data-filter="forest">森林</button>
    </div>

    <!-- 瀑布流容器 (使用文档中的 .masonry) -->
    <div class="masonry" id="gallery">
        <!-- JS 动态插入 .item -->
    </div>
</main>

<!-- 灯箱 (使用文档中的 .lightbox) -->
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img src="" alt="预览大图">
    <p id="lightbox-title"></p>
</div>

<script src="main.js"></script>
</body>
</html>
