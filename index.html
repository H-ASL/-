<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <title>风景摄影社区</title>

    <!-- ✅ 样式 -->
    <link rel="stylesheet" href="style.css" />

    <!-- ✅ 如需使用 CDN 图标可保留（非必须） -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
        rel="stylesheet"
    />
</head>
<body>

<header>
    <h1>风景摄影社区</h1>
    <span id="userInfo">欢迎浏览</span>
</header>

<main>
    <!-- ✅ 上传区域 -->
    <div class="upload-area">
        <input type="file" id="uploadInput" multiple hidden />
        <button id="uploadBtn">+ 上传照片</button>

        <select id="categorySelect">
            <option value="mountain">山川</option>
            <option value="ocean">海洋</option>
            <option value="forest">森林</option>
        </select>
    </div>

    <!-- ✅ 分类筛选 -->
    <div class="filter-bar">
        <button data-filter="all" class="active">全部</button>
        <button data-filter="mountain">山川</button>
        <button data-filter="ocean">海洋</button>
        <button data-filter="forest">森林</button>
    </div>

    <!-- ✅ 瀑布流作品展示 -->
    <div class="masonry" id="gallery">
        <!-- JS 动态生成 -->
    </div>
</main>

<!-- ✅ 灯箱 -->
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img src="" alt="预览图" />
    <p id="lightbox-title"></p>
</div>

<!-- ✅ 脚本 -->
<script src="main.js"></script>

</body>
</html>
