<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>风景摄影作品集</title>
    <link rel="stylesheet" href="/-/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header>
    <h1>风景摄影作品集</h1>
    <nav>
        <a href="/-/index.html">首页</a>
        <a href="/-/about.html">关于我</a>
        <a href="/-/contact.html">联系我</a>
    </nav>
</header>

<main>
    <!-- 上传区域 -->
    <div class="upload-area">
        <input type="file" id="uploadInput" accept="image/*" multiple hidden>
        <button id="uploadBtn">+ 上传照片</button>
    </div>

    <!-- 分类按钮 -->
    <div class="filter-bar">
        <button data-filter="all">全部</button>
        <button data-filter="mountain">山川</button>
        <button data-filter="ocean">海洋</button>
        <button data-filter="forest">森林</button>
        <button data-filter="river">河流</button>
        <button data-filter="city">城市</button>
        <button data-filter="animal">动物</button>
        <button data-filter="nature">自然</button>
        <button data-filter="other">其它</button>
    </div>

    <!-- 瀑布流容器 -->
    <div class="masonry" id="gallery"></div>
</main>

<!-- 灯箱 -->
<div class="lightbox" id="lightbox">
    <span class="close">&times;</span>
    <img src="" alt="">
    <p id="lightbox-title"></p>
</div>

<footer>
    <p>&copy; 2026 hlzt · 风景摄影</p>
</footer>

<script>
/* ================== DOM ================== */
const gallery = document.getElementById('gallery');
const filterBar = document.querySelector('.filter-bar');
const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');
const lightboxTitle = document.getElementById('lightbox-title');
const uploadInput = document.getElementById('uploadInput');
const uploadBtn = document.getElementById('uploadBtn');

/* ================== 数据 ================== */
const STORAGE_KEY = 'photo_portfolio';

// ✅ 默认图片（写死 4 张）
const defaultPhotos = [
    {
        src: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470',
        title: '湖光山色',
        category: 'mountain'
    },
    {
        src: 'https://images.unsplash.com/photo-1519681393784-d120267933ba',
        title: '雪山日出',
        category: 'mountain'
    },
    {
        src: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e',
        title: '森林小径',
        category: 'forest'
    },
    {
        src: 'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1',
        title: '海边黄昏',
        category: 'ocean'
    }
];

function getPhotos() {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    return data && data.length ? data : defaultPhotos;
}

function savePhotos(photos) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(photos));
}

/* ================== 自动分类 ================== */
function autoDetectCategory(file) {
    const name = file.name.toLowerCase();
    if (name.includes('mountain') || name.includes('shan')) return 'mountain';
    if (name.includes('ocean') || name.includes('sea') || name.includes('hai')) return 'ocean';
    if (name.includes('forest') || name.includes('tree') || name.includes('lin')) return 'forest';
    if (name.includes('river') || name.includes('he')) return 'river';
    if (name.includes('city') || name.includes('cheng')) return 'city';
    if (name.includes('animal') || name.includes('dog') || name.includes('cat')) return 'animal';
    if (name.includes('nature')) return 'nature';
    return 'other';
}

/* ================== 渲染 ================== */
function renderGallery(filter = 'all') {
    gallery.innerHTML = '';
    getPhotos()
        .filter(p => filter === 'all' || p.category === filter)
        .forEach((p, i) => {
            const item = document.createElement('figure');
            item.className = 'item';
            item.dataset.category = p.category;

            item.innerHTML = `
                <button class="delete-btn">&times;</button>
                <img src="${p.src}" alt="${p.title}">
                <div class="overlay"><h3>${p.title}</h3></div>
            `;

            item.querySelector('.delete-btn').addEventListener('click', e => {
                e.stopPropagation();
                if (confirm('确定要删除这张作品吗？')) {
                    deletePhoto(i, filter);
                }
            });

            item.querySelector('img').addEventListener('click', () => {
                lightboxImg.src = p.src;
                lightboxTitle.textContent = p.title;
                lightbox.style.display = 'flex';
            });

            gallery.appendChild(item);
        });
}

/* ================== 删除 ================== */
function deletePhoto(index, currentFilter) {
    const photos = getPhotos();
    photos.splice(index, 1);
    savePhotos(photos);
    renderGallery(currentFilter);
}

/* ================== 分类 ================== */
filterBar.addEventListener('click', e => {
    if (e.target.tagName !== 'BUTTON') return;
    filterBar.querySelector('.active')?.classList.remove('active');
    e.target.classList.add('active');
    renderGallery(e.target.dataset.filter);
});

/* ================== 上传（✅ 修复版） ================== */
uploadBtn.addEventListener('click', () => uploadInput.click());

uploadInput.addEventListener('change', async e => {
    const files = Array.from(e.target.files);
    if (!files.length) return;

    const photos = getPhotos();

    await Promise.all(files.map(file => {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = () => {
                photos.unshift({
                    src: reader.result,
                    title: file.name.split('.')[0],
                    category: autoDetectCategory(file)
                });
                resolve();
            };
            reader.readAsDataURL(file);
        });
    }));

    savePhotos(photos);
    renderGallery('all');
    uploadInput.value = ''; // ✅ 永不报错
});

/* ================== 灯箱关闭 ================== */
lightbox.querySelector('.close').addEventListener('click', () => lightbox.style.display = 'none');
lightbox.addEventListener('click', e => e.target === lightbox && (lightbox.style.display = 'none'));

/* ================== 初始化 ================== */
renderGallery('all');
</script>

</body>
</html>
